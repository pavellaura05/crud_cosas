<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosas App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #111827;
      --accent-hover: #374151;
      --danger: #ef4444;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand { font-weight: 600; font-size: 16px; letter-spacing: -.3px; }
    nav .nav-actions { display: flex; gap: 8px; align-items: center; }
    #user-info { font-size: 13px; color: var(--muted); }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── AUTH ── */
    #auth-page {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      padding: 24px;
    }
    #auth-page.active { display: flex; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      width: 100%;
      max-width: 380px;
    }
    .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 24px; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--muted); }
    input, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); font-size: 13px; padding: 6px 12px; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-full { width: 100%; }

    .toggle-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .toggle-link a { color: var(--accent); cursor: pointer; text-decoration: underline; }

    /* ── ALERT ── */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    /* ── MUEBLES PAGE ── */
    #muebles-page { padding: 32px 24px; max-width: 880px; margin: 0 auto; }
    #muebles-page.active { display: block; }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .page-header h1 { font-size: 20px; font-weight: 600; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 8px 30px rgba(0,0,0,.12);
      padding: 28px;
      width: 100%;
      max-width: 400px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--muted);
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .actions { display: flex; gap: 6px; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-state p { margin-top: 8px; }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
      gap: 8px;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <span class="brand">Cosas App</span>
  <div class="nav-actions">
    <button class="btn btn-ghost" id="nav-muebles" style="display:none" onclick="goTo('muebles')">Muebles</button>
    <button class="btn btn-ghost" id="nav-categorias" style="display:none" onclick="goTo('categorias')">Categorías</button>
    <button class="btn btn-ghost" id="nav-usuarios" style="display:none" onclick="goTo('usuarios')">Usuarios</button>
    <span id="user-info"></span>
    <button class="btn btn-ghost" id="btn-logout" style="display:none" onclick="logout()">Salir</button>
  </div>
</nav>

<!-- ══════════════════ AUTH PAGE ══════════════════ -->
<div id="auth-page" class="page active">
  <div class="card">
    <!-- LOGIN -->
    <div id="form-login">
      <h2>Iniciar sesión</h2>
      <div class="alert alert-error" id="login-error"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="correo@ejemplo.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••" />
      </div>
      <button class="btn btn-primary btn-full" id="btn-login" onclick="doLogin()">Entrar</button>
      <p class="toggle-link">¿No tienes cuenta? <a onclick="switchForm('register')">Regístrate</a></p>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">
      <h2>Crear cuenta</h2>
      <div class="alert alert-error" id="register-error"></div>
      <div class="alert alert-success" id="register-success"></div>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="reg-nombre" placeholder="Tu nombre" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="correo@ejemplo.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-password" placeholder="••••••" />
      </div>
      <button class="btn btn-primary btn-full" id="btn-register" onclick="doRegister()">Registrarse</button>
      <p class="toggle-link">¿Ya tienes cuenta? <a onclick="switchForm('login')">Inicia sesión</a></p>
    </div>
  </div>
</div>

<!-- ══════════════════ MUEBLES PAGE ══════════════════ -->
<div id="muebles-page" class="page">
  <div class="page-header">
    <h1>Muebles</h1>
    <button class="btn btn-primary" onclick="openModal()">+ Nuevo mueble</button>
  </div>

  <div id="muebles-list"></div>
</div>

<!-- ══════════════════ CATEGORIAS PAGE ══════════════════ -->
<div id="categorias-page" class="page">
  <div class="page-header">
    <h1>Categorías</h1>
    <button class="btn btn-primary" onclick="openModalCategoria()">+ Nueva categoría</button>
  </div>

  <div id="categorias-list"></div>
</div>

<!-- ══════════════════ USUARIOS PAGE ══════════════════ -->
<div id="usuarios-page" class="page">
  <div class="page-header">
    <h1>Usuarios</h1>
    <button class="btn btn-primary" onclick="openModalUsuario()">+ Nuevo usuario</button>
  </div>

  <div id="usuarios-list"></div>
</div>

<!-- ── MODAL NUEVO MUEBLE ── -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuevo mueble</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="alert alert-error" id="mueble-error"></div>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="mueble-nombre" placeholder="Ej. Sofá de sala" />
    </div>
    <div class="form-group">
      <label>Tipo</label>
      <select id="mueble-tipo">
        <option value="">Selecciona un tipo</option>
        <option value="cocina">Cocina</option>
        <option value="sala">Sala</option>
        <option value="dormitorio">Dormitorio</option>
        <option value="oficina">Oficina</option>
        <option value="baño">Baño</option>
        <option value="exterior">Exterior</option>
        <option value="otro">Otro</option>
      </select>
    </div>
    <div class="form-group">
      <label>Costo (Bs.)</label>
      <input type="number" id="mueble-costo" placeholder="0" min="0" />
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-crear" onclick="crearMueble()">Crear</button>
    </div>
  </div>
</div>

<!-- ── MODAL NUEVA CATEGORIA ── -->
<div class="modal-backdrop" id="modal-categoria-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h3>Nueva categoría</h3>
      <button class="modal-close" onclick="closeModalCategoria()">×</button>
    </div>
    <div class="alert alert-error" id="categoria-error"></div>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="categoria-nombre" placeholder="Ej. Electrodomésticos" />
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
      <button class="btn btn-ghost" onclick="closeModalCategoria()">Cancelar</button>
      <button class="btn btn-primary" id="btn-crear-categoria" onclick="crearCategoria()">Crear</button>
    </div>
  </div>
</div>

<!-- ── MODAL NUEVO USUARIO ── -->
<div class="modal-backdrop" id="modal-usuario-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuevo usuario</h3>
      <button class="modal-close" onclick="closeModalUsuario()">×</button>
    </div>
    <div class="alert alert-error" id="usuario-error"></div>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="usuario-nombre" placeholder="Nombre completo" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="usuario-email" placeholder="correo@ejemplo.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="usuario-password" placeholder="••••••" />
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
      <button class="btn btn-ghost" onclick="closeModalUsuario()">Cancelar</button>
      <button class="btn btn-primary" id="btn-crear-usuario" onclick="crearUsuario()">Crear</button>
    </div>
  </div>
</div>

<script>
  const API = 'https://crud-cosas-y65y.onrender.com';

  /* ─── helpers ─── */
  const $ = id => document.getElementById(id);
  const getToken = () => localStorage.getItem('token');
  const getEmail = () => localStorage.getItem('email');

  function showAlert(id, msg) {
    const el = $(id);
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearAlert(id) { const el = $(id); el.textContent = ''; el.classList.remove('show'); }

  function setLoading(btnId, loading) {
    const btn = $(btnId);
    btn.disabled = loading;
    if (loading) {
      btn._orig = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span>';
    } else {
      btn.innerHTML = btn._orig || btn.innerHTML;
    }
  }

  /* ─── routing ─── */
  function goTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    $(page + '-page').classList.add('active');
    if (page === 'muebles') cargarMuebles();
    if (page === 'categorias') cargarCategorias();
    if (page === 'usuarios') cargarUsuarios();
  }

  function switchForm(which) {
    $('form-login').style.display = which === 'login' ? '' : 'none';
    $('form-register').style.display = which === 'register' ? '' : 'none';
    clearAlert('login-error');
    clearAlert('register-error');
    clearAlert('register-success');
  }

  /* ─── auth ─── */
  async function doLogin() {
    clearAlert('login-error');
    const email = $('login-email').value.trim();
    const password = $('login-password').value;
    if (!email || !password) return showAlert('login-error', 'Completa todos los campos.');
    setLoading('btn-login', true);
    try {
      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || 'Credenciales incorrectas.');
      localStorage.setItem('token', data.token);
      localStorage.setItem('email', email);
      initApp();
    } catch (e) {
      showAlert('login-error', e.message);
    } finally {
      setLoading('btn-login', false);
    }
  }

  async function doRegister() {
    clearAlert('register-error');
    clearAlert('register-success');
    const nombre = $('reg-nombre').value.trim();
    const email = $('reg-email').value.trim();
    const password = $('reg-password').value;
    if (!nombre || !email || !password) return showAlert('register-error', 'Completa todos los campos.');
    setLoading('btn-register', true);
    try {
      const res = await fetch(API + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || 'Error al registrarse.');
      showAlert('register-success', '¡Cuenta creada! Ahora inicia sesión.');
      $('reg-nombre').value = '';
      $('reg-email').value = '';
      $('reg-password').value = '';
      setTimeout(() => switchForm('login'), 1500);
    } catch (e) {
      showAlert('register-error', e.message);
    } finally {
      setLoading('btn-register', false);
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('email');
    $('user-info').textContent = '';
    $('btn-logout').style.display = 'none';
    switchForm('login');
    goTo('auth');
  }

  /* ─── muebles ─── */
  async function cargarMuebles() {
    const list = $('muebles-list');
    list.innerHTML = '<div class="loader"><span class="spinner"></span> Cargando...</div>';
    try {
      const res = await fetch(API + '/muebles', {
        headers: { 'Authorization': 'Bearer ' + getToken() }
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      renderTabla(Array.isArray(data) ? data : (data.data || data.muebles || []));
    } catch {
      list.innerHTML = '<div class="empty-state">⚠ No se pudo cargar la lista.</div>';
    }
  }

  function renderTabla(items) {
    const list = $('muebles-list');
    if (!items.length) {
      list.innerHTML = '<div class="table-wrap"><div class="empty-state"><strong>Sin muebles</strong><p>Crea el primero con el botón de arriba.</p></div></div>';
      return;
    }
    const rows = items.map(m => `
      <tr>
        <td>${escHtml(m.nombre || '—')}</td>
        <td><span class="badge">${escHtml(m.tipo || '—')}</span></td>
        <td>Bs. ${Number(m.costo || 0).toLocaleString('es-BO')}</td>
        <td style="color:var(--muted);font-size:12px">${m._id || m.id || ''}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="editarMueble('${m.id || m._id}')">Editar</button>
            <button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="eliminarMueble('${m.id || m._id}')">Eliminar</button>
          </div>
        </td>
      </tr>`).join('');
    list.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Tipo</th>
              <th>Costo</th>
              <th>ID</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function crearMueble() {
    clearAlert('mueble-error');
    const nombre = $('mueble-nombre').value.trim();
    const tipo = $('mueble-tipo').value;
    const costo = $('mueble-costo').value;
    if (!nombre || !tipo || !costo) return showAlert('mueble-error', 'Completa todos los campos.');
    setLoading('btn-crear', true);
    try {
      const res = await fetch(API + '/muebles', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getToken()
        },
        body: JSON.stringify({ nombre, tipo, costo })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || 'Error al crear.');
      closeModal();
      cargarMuebles();
    } catch (e) {
      showAlert('mueble-error', e.message);
    } finally {
      setLoading('btn-crear', false);
    }
  }

  async function editarMueble(id) {
    const nombre = prompt('Nuevo nombre:');
    if (!nombre) return;
    const tipo = prompt('Nuevo tipo (cocina, sala, dormitorio, oficina, baño, exterior, otro):');
    if (!tipo) return;
    const costo = prompt('Nuevo costo:');
    if (!costo) return;
    try {
      const res = await fetch(API + '/muebles/' + id, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getToken()
        },
        body: JSON.stringify({ nombre, tipo, costo })
      });
      if (!res.ok) throw new Error('Error al actualizar.');
      cargarMuebles();
    } catch (e) {
      alert(e.message);
    }
  }

  async function eliminarMueble(id) {
    if (!confirm('¿Eliminar este mueble?')) return;
    try {
      const res = await fetch(API + '/muebles/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + getToken() }
      });
      if (!res.ok) throw new Error('Error al eliminar.');
      cargarMuebles();
    } catch (e) {
      alert(e.message);
    }
  }

  /* ─── modal ─── */
  function openModal() {
    clearAlert('mueble-error');
    $('mueble-nombre').value = '';
    $('mueble-tipo').value = '';
    $('mueble-costo').value = '';
    $('modal-backdrop').classList.add('open');
    setTimeout(() => $('mueble-nombre').focus(), 50);
  }
  function closeModal() { $('modal-backdrop').classList.remove('open'); }
  $('modal-backdrop').addEventListener('click', e => { if (e.target === $('modal-backdrop')) closeModal(); });

  /* ─── categorías ─── */
  async function cargarCategorias() {
    const list = $('categorias-list');
    list.innerHTML = '<div class="loader"><span class="spinner"></span> Cargando...</div>';
    try {
      const res = await fetch(API + '/categorias', {
        headers: { 'Authorization': 'Bearer ' + getToken() }
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      renderTablaCategorias(Array.isArray(data) ? data : (data.data || data.categorias || []));
    } catch {
      list.innerHTML = '<div class="empty-state">⚠ No se pudo cargar la lista.</div>';
    }
  }

  function renderTablaCategorias(items) {
    const list = $('categorias-list');
    if (!items.length) {
      list.innerHTML = '<div class="table-wrap"><div class="empty-state"><strong>Sin categorías</strong><p>Crea la primera con el botón de arriba.</p></div></div>';
      return;
    }
    const rows = items.map(c => `
      <tr>
        <td>${escHtml(c.nombre || '—')}</td>
        <td style="color:var(--muted);font-size:12px">${c._id || c.id || ''}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="editarCategoria('${c.id || c._id}')">Editar</button>
            <button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="eliminarCategoria('${c.id || c._id}')">Eliminar</button>
          </div>
        </td>
      </tr>`).join('');
    list.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>ID</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  async function crearCategoria() {
    clearAlert('categoria-error');
    const nombre = $('categoria-nombre').value.trim();
    if (!nombre) return showAlert('categoria-error', 'Completa el nombre.');
    setLoading('btn-crear-categoria', true);
    try {
      const res = await fetch(API + '/categorias', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getToken()
        },
        body: JSON.stringify({ nombre })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || 'Error al crear.');
      closeModalCategoria();
      cargarCategorias();
    } catch (e) {
      showAlert('categoria-error', e.message);
    } finally {
      setLoading('btn-crear-categoria', false);
    }
  }

  async function editarCategoria(id) {
    const nombre = prompt('Nuevo nombre:');
    if (!nombre) return;
    try {
      const res = await fetch(API + '/categorias/' + id, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getToken()
        },
        body: JSON.stringify({ nombre })
      });
      if (!res.ok) throw new Error('Error al actualizar.');
      cargarCategorias();
    } catch (e) {
      alert(e.message);
    }
  }

  async function eliminarCategoria(id) {
    if (!confirm('¿Eliminar esta categoría?')) return;
    try {
      const res = await fetch(API + '/categorias/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + getToken() }
      });
      if (!res.ok) throw new Error('Error al eliminar.');
      cargarCategorias();
    } catch (e) {
      alert(e.message);
    }
  }

  function openModalCategoria() {
    clearAlert('categoria-error');
    $('categoria-nombre').value = '';
    $('modal-categoria-backdrop').classList.add('open');
    setTimeout(() => $('categoria-nombre').focus(), 50);
  }
  function closeModalCategoria() { $('modal-categoria-backdrop').classList.remove('open'); }
  $('modal-categoria-backdrop').addEventListener('click', e => { if (e.target === $('modal-categoria-backdrop')) closeModalCategoria(); });

  /* ─── usuarios ─── */
  async function cargarUsuarios() {
    const list = $('usuarios-list');
    list.innerHTML = '<div class="loader"><span class="spinner"></span> Cargando...</div>';
    try {
      const res = await fetch(API + '/usuarios', {
        headers: { 'Authorization': 'Bearer ' + getToken() }
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      renderTablaUsuarios(Array.isArray(data) ? data : (data.data || data.usuarios || []));
    } catch {
      list.innerHTML = '<div class="empty-state">⚠ No se pudo cargar la lista.</div>';
    }
  }

  function renderTablaUsuarios(items) {
    const list = $('usuarios-list');
    if (!items.length) {
      list.innerHTML = '<div class="table-wrap"><div class="empty-state"><strong>Sin usuarios</strong><p>Crea el primero con el botón de arriba.</p></div></div>';
      return;
    }
    const rows = items.map(u => `
      <tr>
        <td>${escHtml(u.nombre || '—')}</td>
        <td>${escHtml(u.email || '—')}</td>
        <td><span class="badge">${escHtml(u.rol || 'user')}</span></td>
        <td style="color:var(--muted);font-size:12px">${u._id || u.id || ''}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="editarUsuario('${u.id || u._id}')">Editar</button>
            <button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="eliminarUsuario('${u.id || u._id}')">Eliminar</button>
          </div>
        </td>
      </tr>`).join('');
    list.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Rol</th>
              <th>ID</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  async function crearUsuario() {
    clearAlert('usuario-error');
    const nombre = $('usuario-nombre').value.trim();
    const email = $('usuario-email').value.trim();
    const password = $('usuario-password').value;
    if (!nombre || !email || !password) return showAlert('usuario-error', 'Completa todos los campos.');
    setLoading('btn-crear-usuario', true);
    try {
      const res = await fetch(API + '/usuarios', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getToken()
        },
        body: JSON.stringify({ nombre, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || 'Error al crear.');
      closeModalUsuario();
      cargarUsuarios();
    } catch (e) {
      showAlert('usuario-error', e.message);
    } finally {
      setLoading('btn-crear-usuario', false);
    }
  }

  async function editarUsuario(id) {
    const nombre = prompt('Nuevo nombre:');
    if (!nombre) return;
    const email = prompt('Nuevo email:');
    if (!email) return;
    try {
      const res = await fetch(API + '/usuarios/' + id, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getToken()
        },
        body: JSON.stringify({ nombre, email })
      });
      if (!res.ok) throw new Error('Error al actualizar.');
      cargarUsuarios();
    } catch (e) {
      alert(e.message);
    }
  }

  async function eliminarUsuario(id) {
    if (!confirm('¿Eliminar este usuario?')) return;
    try {
      const res = await fetch(API + '/usuarios/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + getToken() }
      });
      if (!res.ok) throw new Error('Error al eliminar.');
      cargarUsuarios();
    } catch (e) {
      alert(e.message);
    }
  }

  function openModalUsuario() {
    clearAlert('usuario-error');
    $('usuario-nombre').value = '';
    $('usuario-email').value = '';
    $('usuario-password').value = '';
    $('modal-usuario-backdrop').classList.add('open');
    setTimeout(() => $('usuario-nombre').focus(), 50);
  }
  function closeModalUsuario() { $('modal-usuario-backdrop').classList.remove('open'); }
  $('modal-usuario-backdrop').addEventListener('click', e => { if (e.target === $('modal-usuario-backdrop')) closeModalUsuario(); });

  /* ─── Enter key support ─── */
  ['login-email','login-password'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
  ['reg-nombre','reg-email','reg-password'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); }));
  ['mueble-nombre','mueble-tipo','mueble-costo'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') crearMueble(); }));
  $('categoria-nombre').addEventListener('keydown', e => { if (e.key === 'Enter') crearCategoria(); });

  /* ─── init ─── */
  function initApp() {
    const token = getToken();
    if (token) {
      $('user-info').textContent = getEmail();
      $('btn-logout').style.display = '';
      $('nav-muebles').style.display = '';
      $('nav-categorias').style.display = '';
      $('nav-usuarios').style.display = '';
      goTo('muebles');
    } else {
      goTo('auth');
    }
  }

  initApp();
</script>
</body>
</html>
